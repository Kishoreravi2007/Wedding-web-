<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Face Detection Test - Wedding Website</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/face-api.js@0.22.2/dist/face-api.min.js"></script>
    <style>
        .detection-canvas {
            position: absolute;
            top: 0;
            left: 0;
            pointer-events: none;
        }
    </style>
</head>
<body class="bg-gray-50 min-h-screen">
    <div class="container mx-auto px-4 py-8">
        <div class="text-center mb-8">
            <h1 class="text-3xl font-bold text-gray-900 mb-2">Face Detection Test</h1>
            <p class="text-gray-600">Test your wedding website face detection functionality</p>
        </div>

        <div class="max-w-2xl mx-auto bg-white rounded-lg shadow-lg p-6">
            <!-- Status -->
            <div class="mb-4">
                <div class="flex items-center gap-2">
                    <div id="status-dot" class="w-3 h-3 rounded-full bg-yellow-500"></div>
                    <span id="status-text" class="text-sm">Loading models...</span>
                </div>
                <div class="w-full bg-gray-200 rounded-full h-2 mt-2">
                    <div id="progress-bar" class="bg-blue-600 h-2 rounded-full transition-all duration-300" style="width: 0%"></div>
                </div>
            </div>

            <!-- Controls -->
            <div class="flex gap-3 mb-4">
                <button id="webcam-btn" class="bg-blue-500 hover:bg-blue-600 text-white px-4 py-2 rounded disabled:opacity-50" disabled>
                    Start Webcam
                </button>
                <button id="test-photo-btn" class="bg-green-500 hover:bg-green-600 text-white px-4 py-2 rounded disabled:opacity-50" disabled>
                    Test Photo
                </button>
                <button id="clear-btn" class="bg-gray-500 hover:bg-gray-600 text-white px-4 py-2 rounded">
                    Clear
                </button>
            </div>

            <!-- Detection Area -->
            <div class="relative bg-gray-100 rounded-lg overflow-hidden mb-4">
                <video id="video" class="w-full h-auto hidden" autoplay muted playsinline></video>
                <div id="image-container" class="relative hidden">
                    <img id="test-image" class="w-full h-auto" alt="Test image">
                    <canvas id="detection-canvas" class="detection-canvas"></canvas>
                </div>
                <div id="placeholder" class="flex items-center justify-center h-64 text-gray-500">
                    <div class="text-center">
                        <div class="text-lg mb-2">🎭</div>
                        <p>Click "Start Webcam" or "Test Photo" to begin</p>
                    </div>
                </div>
            </div>

            <!-- Results -->
            <div id="results" class="hidden bg-green-50 p-4 rounded-lg">
                <h3 class="font-semibold text-green-900 mb-2">Detection Results</h3>
                <div id="result-details" class="text-sm text-green-800"></div>
            </div>

            <!-- Console Output -->
            <div class="mt-6">
                <h3 class="font-semibold mb-2">Console Output:</h3>
                <div id="console-output" class="bg-gray-900 text-green-400 p-3 rounded text-xs font-mono h-32 overflow-y-auto"></div>
            </div>
        </div>
    </div>

    <script>
        // Console redirection
        const consoleOutput = document.getElementById('console-output');
        const originalLog = console.log;
        const originalError = console.error;
        
        function addToConsole(message, type = 'log') {
            const timestamp = new Date().toLocaleTimeString();
            const color = type === 'error' ? 'text-red-400' : 'text-green-400';
            consoleOutput.innerHTML += `<div class="${color}">[${timestamp}] ${message}</div>`;
            consoleOutput.scrollTop = consoleOutput.scrollHeight;
        }
        
        console.log = (...args) => {
            originalLog(...args);
            addToConsole(args.join(' '), 'log');
        };
        
        console.error = (...args) => {
            originalError(...args);
            addToConsole(args.join(' '), 'error');
        };

        // Face Detection Test App
        class FaceDetectionTest {
            constructor() {
                this.isModelLoaded = false;
                this.isWebcamActive = false;
                this.detectionResults = [];
                
                this.elements = {
                    statusDot: document.getElementById('status-dot'),
                    statusText: document.getElementById('status-text'),
                    progressBar: document.getElementById('progress-bar'),
                    webcamBtn: document.getElementById('webcam-btn'),
                    testPhotoBtn: document.getElementById('test-photo-btn'),
                    clearBtn: document.getElementById('clear-btn'),
                    video: document.getElementById('video'),
                    imageContainer: document.getElementById('image-container'),
                    testImage: document.getElementById('test-image'),
                    detectionCanvas: document.getElementById('detection-canvas'),
                    placeholder: document.getElementById('placeholder'),
                    results: document.getElementById('results'),
                    resultDetails: document.getElementById('result-details')
                };
                
                this.init();
            }
            
            async init() {
                console.log('🚀 Initializing Face Detection Test');
                this.setupEventListeners();
                await this.loadModels();
            }
            
            setupEventListeners() {
                this.elements.webcamBtn.addEventListener('click', () => this.toggleWebcam());
                this.elements.testPhotoBtn.addEventListener('click', () => this.testWithPhoto());
                this.elements.clearBtn.addEventListener('click', () => this.clear());
            }
            
            async loadModels() {
                try {
                    this.updateProgress(10, 'Loading TinyFaceDetector...');
                    await faceapi.nets.tinyFaceDetector.loadFromUri('frontend/public/models');
                    
                    this.updateProgress(40, 'Loading FaceLandmark68Net...');
                    await faceapi.nets.faceLandmark68Net.loadFromUri('frontend/public/models');
                    
                    this.updateProgress(70, 'Loading FaceRecognitionNet...');
                    await faceapi.nets.faceRecognitionNet.loadFromUri('frontend/public/models');
                    
                    this.updateProgress(100, 'Models loaded successfully!');
                    
                    this.elements.statusDot.className = 'w-3 h-3 rounded-full bg-green-500';
                    this.elements.webcamBtn.disabled = false;
                    this.elements.testPhotoBtn.disabled = false;
                    this.isModelLoaded = true;
                    
                    console.log('✅ All models loaded successfully');
                    
                } catch (error) {
                    console.error('❌ Error loading models:', error);
                    this.elements.statusDot.className = 'w-3 h-3 rounded-full bg-red-500';
                    this.elements.statusText.textContent = 'Failed to load models';
                }
            }
            
            updateProgress(percentage, text) {
                this.elements.progressBar.style.width = `${percentage}%`;
                this.elements.statusText.textContent = text;
            }
            
            async toggleWebcam() {
                if (this.isWebcamActive) {
                    this.stopWebcam();
                } else {
                    await this.startWebcam();
                }
            }
            
            async startWebcam() {
                try {
                    const stream = await navigator.mediaDevices.getUserMedia({ 
                        video: { width: 640, height: 480, facingMode: 'user' } 
                    });
                    
                    this.elements.video.srcObject = stream;
                    this.elements.video.classList.remove('hidden');
                    this.elements.placeholder.classList.add('hidden');
                    this.elements.imageContainer.classList.add('hidden');
                    
                    this.isWebcamActive = true;
                    this.elements.webcamBtn.textContent = 'Stop Webcam';
                    this.elements.webcamBtn.className = 'bg-red-500 hover:bg-red-600 text-white px-4 py-2 rounded';
                    
                    console.log('📹 Webcam started');
                    this.detectFacesInVideo();
                    
                } catch (error) {
                    console.error('❌ Webcam error:', error);
                }
            }
            
            stopWebcam() {
                const video = this.elements.video;
                if (video.srcObject) {
                    const stream = video.srcObject;
                    stream.getTracks().forEach(track => track.stop());
                    video.srcObject = null;
                }
                
                this.isWebcamActive = false;
                this.elements.video.classList.add('hidden');
                this.elements.placeholder.classList.remove('hidden');
                this.elements.webcamBtn.textContent = 'Start Webcam';
                this.elements.webcamBtn.className = 'bg-blue-500 hover:bg-blue-600 text-white px-4 py-2 rounded';
                
                console.log('📹 Webcam stopped');
            }
            
            async detectFacesInVideo() {
                if (!this.isWebcamActive) return;
                
                try {
                    const video = this.elements.video;
                    const canvas = this.elements.detectionCanvas;
                    
                    if (video.readyState !== video.HAVE_ENOUGH_DATA) {
                        requestAnimationFrame(() => this.detectFacesInVideo());
                        return;
                    }
                    
                    canvas.width = video.videoWidth;
                    canvas.height = video.videoHeight;
                    
                    const detections = await faceapi
                        .detectAllFaces(video, new faceapi.TinyFaceDetectorOptions({
                            inputSize: 416,
                            scoreThreshold: 0.4
                        }))
                        .withFaceLandmarks();
                    
                    this.drawDetections(detections);
                    this.updateResults(detections);
                    
                } catch (error) {
                    console.error('Detection error:', error);
                }
                
                if (this.isWebcamActive) {
                    setTimeout(() => requestAnimationFrame(() => this.detectFacesInVideo()), 100);
                }
            }
            
            async testWithPhoto() {
                // Create a test canvas with a simple face-like shape
                const canvas = document.createElement('canvas');
                canvas.width = 200;
                canvas.height = 200;
                const ctx = canvas.getContext('2d');
                
                // Draw a simple face
                ctx.fillStyle = '#ffdbac';
                ctx.fillRect(50, 50, 100, 120);
                
                // Eyes
                ctx.fillStyle = '#000';
                ctx.fillRect(70, 80, 10, 10);
                ctx.fillRect(120, 80, 10, 10);
                
                // Nose
                ctx.fillRect(95, 100, 10, 15);
                
                // Mouth
                ctx.fillRect(85, 130, 30, 5);
                
                this.elements.testImage.src = canvas.toDataURL();
                this.elements.imageContainer.classList.remove('hidden');
                this.elements.placeholder.classList.add('hidden');
                this.elements.video.classList.add('hidden');
                
                console.log('🖼️ Testing with simple face drawing');
                
                try {
                    const detections = await faceapi
                        .detectAllFaces(this.elements.testImage, new faceapi.TinyFaceDetectorOptions({
                            inputSize: 320,
                            scoreThreshold: 0.1
                        }));
                    
                    this.drawDetections(detections);
                    this.updateResults(detections);
                    
                } catch (error) {
                    console.error('❌ Photo test error:', error);
                }
            }
            
            drawDetections(detections) {
                const canvas = this.elements.detectionCanvas;
                const ctx = canvas.getContext('2d');
                
                ctx.clearRect(0, 0, canvas.width, canvas.height);
                
                detections.forEach((detection, index) => {
                    const { x, y, width, height } = detection.detection.box;
                    const confidence = detection.detection.score;
                    
                    // Draw bounding box
                    ctx.strokeStyle = '#00ff00';
                    ctx.lineWidth = 2;
                    ctx.strokeRect(x, y, width, height);
                    
                    // Draw confidence
                    ctx.fillStyle = '#00ff00';
                    ctx.font = '12px Arial';
                    ctx.fillText(
                        `${(confidence * 100).toFixed(1)}%`,
                        x,
                        y - 5
                    );
                });
            }
            
            updateResults(detections) {
                if (detections.length > 0) {
                    this.elements.results.classList.remove('hidden');
                    this.elements.resultDetails.innerHTML = `
                        <div>Found ${detections.length} face(s)</div>
                        ${detections.map((det, i) => 
                            `<div>Face ${i+1}: ${(det.detection.score * 100).toFixed(1)}% confidence</div>`
                        ).join('')}
                    `;
                    console.log(`✅ Detected ${detections.length} face(s)`);
                } else {
                    this.elements.results.classList.add('hidden');
                }
            }
            
            clear() {
                this.elements.results.classList.add('hidden');
                this.elements.placeholder.classList.remove('hidden');
                this.elements.imageContainer.classList.add('hidden');
                
                const canvas = this.elements.detectionCanvas;
                const ctx = canvas.getContext('2d');
                ctx.clearRect(0, 0, canvas.width, canvas.height);
                
                console.log('🧹 Cleared');
            }
        }
        
        // Initialize when page loads
        document.addEventListener('DOMContentLoaded', () => {
            new FaceDetectionTest();
        });
    </script>
</body>
</html>
