# Cloud Build configuration for Backend ONLY
steps:
  # Step 1: Build Docker image
  - name: 'gcr.io/cloud-builders/docker'
    id: 'build-backend'
    args:
      - 'build'
      - '-t'
      - 'gcr.io/$PROJECT_ID/wedding-backend:$COMMIT_SHA'
      - '-t'
      - 'gcr.io/$PROJECT_ID/wedding-backend:latest'
      - '-f'
      - 'backend/Dockerfile'
      - 'backend'

  # Step 2: Push to Container Registry
  - name: 'gcr.io/cloud-builders/docker'
    id: 'push-backend'
    args:
      - 'push'
      - 'gcr.io/$PROJECT_ID/wedding-backend:$COMMIT_SHA'
    waitFor: ['build-backend']

  # Step 3: Deploy to Cloud Run
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    id: 'deploy-backend'
    entrypoint: 'gcloud'
    args:
      - 'run'
      - 'deploy'
      - 'wedding-backend'
      - '--image'
      - 'gcr.io/$PROJECT_ID/wedding-backend:$COMMIT_SHA'
      - '--region'
      - 'asia-south1'
      - '--platform'
      - 'managed'
      - '--allow-unauthenticated'
      - '--memory'
      - '512Mi'
      - '--update-env-vars'
      - 'NODE_ENV=production'
    waitFor: ['push-backend']

images:
  - 'gcr.io/$PROJECT_ID/wedding-backend:$COMMIT_SHA'
  - 'gcr.io/$PROJECT_ID/wedding-backend:latest'

timeout: '1200s'

options:
  logging: CLOUD_LOGGING_ONLY
