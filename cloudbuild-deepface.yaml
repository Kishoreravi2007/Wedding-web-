# Cloud Build configuration for DeepFace API ONLY
steps:
  # Step 1: Build Docker image
  - name: 'gcr.io/cloud-builders/docker'
    id: 'build-deepface'
    args:
      - 'build'
      - '-t'
      - 'gcr.io/$PROJECT_ID/wedding-deepface:$COMMIT_SHA'
      - '-t'
      - 'gcr.io/$PROJECT_ID/wedding-deepface:latest'
      - '-f'
      - 'backend/Dockerfile.deepface'
      - 'backend'

  # Step 2: Push to Container Registry
  - name: 'gcr.io/cloud-builders/docker'
    id: 'push-deepface'
    args:
      - 'push'
      - 'gcr.io/$PROJECT_ID/wedding-deepface:$COMMIT_SHA'
    waitFor: ['build-deepface']

  # Step 3: Deploy to Cloud Run
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    id: 'deploy-deepface'
    entrypoint: 'gcloud'
    args:
      - 'run'
      - 'deploy'
      - 'wedding-deepface'
      - '--image'
      - 'gcr.io/$PROJECT_ID/wedding-deepface:$COMMIT_SHA'
      - '--region'
      - 'asia-south1'
      - '--platform'
      - 'managed'
      - '--allow-unauthenticated'
      - '--memory'
      - '4Gi'
      - '--cpu'
      - '4'
      - '--timeout'
      - '300s'
    waitFor: ['push-deepface']

images:
  - 'gcr.io/$PROJECT_ID/wedding-deepface:$COMMIT_SHA'
  - 'gcr.io/$PROJECT_ID/wedding-deepface:latest'

timeout: '1800s'

options:
  logging: CLOUD_LOGGING_ONLY
