# Cloud Build configuration for Frontend ONLY
steps:
  # Step 1: Install dependencies and build
  - name: 'node:20'
    id: 'build-frontend'
    dir: 'frontend'
    entrypoint: 'bash'
    args:
      - '-c'
      - |
        npm install
        npm run build
    env:
      - 'VITE_API_BASE_URL=https://wedding-backend-979970479540.asia-south1.run.app'
      - 'VITE_BACKEND_URL=https://wedding-backend-979970479540.asia-south1.run.app'
      - 'VITE_DEEPFACE_API_URL=https://wedding-deepface-rst3dulcnq-el.a.run.app'
      - 'VITE_SUPABASE_URL=https://dmsghmogmwmpxjaipbod.supabase.co'
      - 'VITE_SUPABASE_ANON_KEY=eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImRtc2dobW9nbXdtcHhqYWlwYm9kIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NjE0NzU1MDgsImV4cCI6MjA3NzA1MTUwOH0.ql_cJb4YSxj2mhUMd79t2IyafG3CURxNf8rKgRf2Iyw'

  # Step 2: Deploy to Cloud Storage
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    id: 'deploy-frontend'
    entrypoint: 'bash'
    args:
      - '-c'
      - |
        gsutil -m cp -r frontend/dist/* gs://$PROJECT_ID-wedding-frontend/
        gsutil -m setmeta -h "Cache-Control:private, max-age=0, no-transform" gs://$PROJECT_ID-wedding-frontend/**/*.html
    waitFor: ['build-frontend']

options:
  logging: CLOUD_LOGGING_ONLY
