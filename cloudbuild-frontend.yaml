# Cloud Build configuration for Frontend ONLY
steps:
  # Step 1: Install dependencies and build
  - name: 'node:20'
    id: 'build-frontend'
    dir: 'frontend'
    entrypoint: 'bash'
    args:
      - '-c'
      - |
        npm install
        npm run build
    env:
      - 'VITE_API_BASE_URL=https://wedding-backend-979970479540.asia-south1.run.app/api'
      - 'VITE_BACKEND_URL=https://wedding-backend-979970479540.asia-south1.run.app'
      - 'VITE_DEEPFACE_API_URL=https://wedding-deepface-979970479540.asia-south1.run.app'

  # Step 2: Deploy to Cloud Storage
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    id: 'deploy-frontend'
    entrypoint: 'bash'
    args:
      - '-c'
      - |
        gsutil -m cp -r frontend/dist/* gs://$PROJECT_ID-wedding-frontend/
        gsutil cp gs://$PROJECT_ID-wedding-frontend/index.html gs://$PROJECT_ID-wedding-frontend/404.html
        gsutil -m setmeta -h "Cache-Control:private, max-age=0, no-transform" gs://$PROJECT_ID-wedding-frontend/**/*.html
        gsutil web set -m index.html -e 404.html gs://$PROJECT_ID-wedding-frontend/
        gsutil cors set gcs-cors.json gs://$PROJECT_ID-wedding-frontend/
    waitFor: ['build-frontend']

options:
  logging: CLOUD_LOGGING_ONLY
