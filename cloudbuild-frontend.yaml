# Cloud Build configuration for Frontend ONLY
steps:
  # Step 1: Install dependencies and build
  - name: 'node:20'
    id: 'build-frontend'
    dir: 'frontend'
    entrypoint: 'bash'
    args:
      - '-c'
      - |
        npm install
        npm run build

  # Step 2: Deploy to Cloud Storage
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    id: 'deploy-frontend'
    entrypoint: 'bash'
    args:
      - '-c'
      - |
        gsutil -m cp -r frontend/dist/* gs://$PROJECT_ID-wedding-frontend/
    waitFor: ['build-frontend']

options:
  logging: CLOUD_LOGGING_ONLY
