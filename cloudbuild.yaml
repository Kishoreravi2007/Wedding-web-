# Cloud Build configuration for Wedding Website
# Deploys Frontend, Backend, and DeepFace API to Cloud Run

steps:
  # Step 1: Build Frontend static files
  - name: 'node:20'
    id: 'build-frontend'
    dir: 'frontend'
    entrypoint: 'bash'
    args:
      - '-c'
      - |
        npm install
        npm run build

  # Step 2: Build Backend Docker image
  - name: 'gcr.io/cloud-builders/docker'
    id: 'build-backend'
    args:
      - 'build'
      - '-t'
      - 'gcr.io/$PROJECT_ID/wedding-backend:$COMMIT_SHA'
      - '-t'
      - 'gcr.io/$PROJECT_ID/wedding-backend:latest'
      - '-f'
      - 'backend/Dockerfile'
      - 'backend'

  # Step 3: Build DeepFace API Docker image
  - name: 'gcr.io/cloud-builders/docker'
    id: 'build-deepface'
    args:
      - 'build'
      - '-t'
      - 'gcr.io/$PROJECT_ID/wedding-deepface:$COMMIT_SHA'
      - '-t'
      - 'gcr.io/$PROJECT_ID/wedding-deepface:latest'
      - '-f'
      - 'backend/Dockerfile.deepface'
      - 'backend'

  # Step 4: Push Backend image to Container Registry
  - name: 'gcr.io/cloud-builders/docker'
    id: 'push-backend'
    args:
      - 'push'
      - 'gcr.io/$PROJECT_ID/wedding-backend:$COMMIT_SHA'
    waitFor: ['build-backend']

  # Step 5: Push DeepFace image to Container Registry
  - name: 'gcr.io/cloud-builders/docker'
    id: 'push-deepface'
    args:
      - 'push'
      - 'gcr.io/$PROJECT_ID/wedding-deepface:$COMMIT_SHA'
    waitFor: ['build-deepface']

  # Step 6: Deploy Backend to Cloud Run
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    id: 'deploy-backend'
    entrypoint: 'gcloud'
    args:
      - 'run'
      - 'deploy'
      - 'wedding-backend'
      - '--image'
      - 'gcr.io/$PROJECT_ID/wedding-backend:$COMMIT_SHA'
      - '--region'
      - 'asia-south1'
      - '--platform'
      - 'managed'
      - '--allow-unauthenticated'
      - '--memory'
      - '512Mi'
      - '--set-env-vars'
      - 'NODE_ENV=production'
    waitFor: ['push-backend']

  # Step 7: Deploy DeepFace API to Cloud Run
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    id: 'deploy-deepface'
    entrypoint: 'gcloud'
    args:
      - 'run'
      - 'deploy'
      - 'wedding-deepface'
      - '--image'
      - 'gcr.io/$PROJECT_ID/wedding-deepface:$COMMIT_SHA'
      - '--region'
      - 'asia-south1'
      - '--platform'
      - 'managed'
      - '--allow-unauthenticated'
      - '--memory'
      - '2Gi'
      - '--cpu'
      - '2'
      - '--timeout'
      - '300s'
    waitFor: ['push-deepface']

  # Step 8: Copy Frontend to Cloud Storage for hosting
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    id: 'deploy-frontend'
    entrypoint: 'bash'
    args:
      - '-c'
      - |
        gsutil -m cp -r frontend/dist/* gs://$PROJECT_ID-wedding-frontend/
    waitFor: ['build-frontend']

# Build images are stored here
images:
  - 'gcr.io/$PROJECT_ID/wedding-backend:$COMMIT_SHA'
  - 'gcr.io/$PROJECT_ID/wedding-backend:latest'
  - 'gcr.io/$PROJECT_ID/wedding-deepface:$COMMIT_SHA'
  - 'gcr.io/$PROJECT_ID/wedding-deepface:latest'

# Build timeout
timeout: '1800s'

options:
  logging: CLOUD_LOGGING_ONLY
