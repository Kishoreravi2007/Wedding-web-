<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta http-equiv="refresh" content="0; url=/index.html">
  <title>Redirecting...</title>
  <script>
    // Store the requested path and redirect to index.html
    // The React router will then handle the routing client-side
    sessionStorage.setItem('redirectPath', window.location.pathname + window.location.search + window.location.hash);
    window.location.href = '/index.html';
  </script>
</head>
<body>
  <p>Redirecting to homepage...</p>
</body>
</html>
