<!DOCTYPE html>

<html lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#1754cf",
                        "background-light": "#f6f6f8",
                        "background-dark": "#111621",
                    },
                    fontFamily: {
                        "display": ["Manrope", "sans-serif"]
                    },
                    borderRadius: {"DEFAULT": "0.25rem", "lg": "0.5rem", "xl": "0.75rem", "full": "9999px"},
                },
            },
        }
    </script>
<title>Vendor Login | Wedding Web</title>
</head>
<body class="bg-background-light dark:bg-background-dark font-display antialiased">
<div class="relative flex min-h-screen w-full flex-col items-center justify-center p-4">
<!-- Logo / Branding -->
<div class="mb-8 flex flex-col items-center gap-2">
<div class="flex items-center gap-2 text-primary">
<div class="size-8">
<svg fill="none" viewbox="0 0 48 48" xmlns="http://www.w3.org/2000/svg">
<g clip-path="url(#clip0_logo)">
<path d="M8.57829 8.57829C5.52816 11.6284 3.451 15.5145 2.60947 19.7452C1.76794 23.9758 2.19984 28.361 3.85056 32.3462C5.50128 36.3314 8.29667 39.7376 11.8832 42.134C15.4698 44.5305 19.6865 45.8096 24 45.8096C28.3135 45.8096 32.5302 44.5305 36.1168 42.134C39.7033 39.7375 42.4987 36.3314 44.1494 32.3462C45.8002 28.361 46.2321 23.9758 45.3905 19.7452C44.549 15.5145 42.4718 11.6284 39.4217 8.57829L24 24L8.57829 8.57829Z" fill="currentColor"></path>
</g>
<defs>
<clippath id="clip0_logo"><rect fill="white" height="48" width="48"></rect></clippath>
</defs>
</svg>
</div>
<h1 class="text-slate-900 dark:text-slate-100 text-2xl font-bold tracking-tight">Wedding Web</h1>
</div>
</div>
<!-- Login Card -->
<div class="w-full max-w-[440px] bg-white dark:bg-slate-900 rounded-xl shadow-xl shadow-primary/5 border border-slate-200 dark:border-slate-800 overflow-hidden">
<!-- Hero Image Section (Subtle) -->
<div class="h-32 w-full bg-primary/10 relative overflow-hidden">
<div class="absolute inset-0 opacity-20" data-alt="Soft bokeh wedding ceremony flowers background" style='background-image: url("https://lh3.googleusercontent.com/aida-public/AB6AXuAsfRs8GVEMVzKczBkdaaN40jEAz5v98-R8Y1FUp9MrdZFwb4boRZdzzyZM3mIp8X4ScCZdyHqTYf_Eqvn1a0oXKciBaSTA9SFc-_cfojlcdOlAkg-D5mKOgdmoiI5_2yVg260Z8P3LekSjPWqJs81v-Xg8TU-tGMmmNu4iLKtB_uWTsc2h-R2LvIvfHZVInsYQBlvx3Cr4h-cx8QYXteRPd1gSS3YK2AtEm-nqGx_8lCioupsfOull3iK1xK_Sby3wrNVY-VI3tP8_"); background-size: cover; background-position: center;'></div>
<div class="absolute inset-0 bg-gradient-to-t from-white dark:from-slate-900 to-transparent"></div>
</div>
<div class="px-8 pb-10 pt-2">
<div class="mb-8">
<h2 class="text-slate-900 dark:text-slate-100 text-2xl font-bold leading-tight">Vendor Login</h2>
<p class="text-slate-500 dark:text-slate-400 text-sm mt-1">Enter your credentials to manage your business.</p>
</div>
<form class="space-y-5">
<!-- Email Field -->
<div class="flex flex-col gap-2">
<label class="text-slate-700 dark:text-slate-300 text-sm font-semibold">Email Address</label>
<div class="relative">
<input class="w-full rounded-lg border border-slate-200 dark:border-slate-700 bg-white dark:bg-slate-800 px-4 py-3 text-slate-900 dark:text-slate-100 placeholder:text-slate-400 focus:border-primary focus:ring-2 focus:ring-primary/20 transition-all outline-none" placeholder="name@company.com" type="email"/>
</div>
</div>
<!-- Password Field -->
<div class="flex flex-col gap-2">
<div class="flex justify-between items-center">
<label class="text-slate-700 dark:text-slate-300 text-sm font-semibold">Password</label>
<a class="text-primary text-xs font-semibold hover:underline" href="#">Forgot password?</a>
</div>
<div class="relative flex items-center">
<input class="w-full rounded-lg border border-slate-200 dark:border-slate-700 bg-white dark:bg-slate-800 px-4 py-3 text-slate-900 dark:text-slate-100 placeholder:text-slate-400 focus:border-primary focus:ring-2 focus:ring-primary/20 transition-all outline-none" placeholder="••••••••" type="password"/>
<button class="absolute right-3 text-slate-400 hover:text-slate-600 dark:hover:text-slate-200" type="button">
<span class="material-symbols-outlined text-[20px]">visibility</span>
</button>
</div>
</div>
<!-- Submit Button -->
<button class="w-full bg-primary hover:bg-primary/90 text-white font-bold py-3.5 px-4 rounded-lg shadow-lg shadow-primary/20 transition-all flex items-center justify-center gap-2 group" type="submit">
<span>Sign In</span>
<span class="material-symbols-outlined text-[18px] group-hover:translate-x-0.5 transition-transform">arrow_forward</span>
</button>
</form>
<div class="mt-8 pt-6 border-t border-slate-100 dark:border-slate-800 text-center">
<p class="text-slate-500 dark:text-slate-400 text-sm">
                        New to Wedding Web? 
                        <a class="text-primary font-semibold hover:underline ml-1" href="#">Partner with us</a>
</p>
</div>
</div>
</div>
<!-- Footer Links -->
<footer class="mt-8 flex gap-6 text-xs text-slate-400 font-medium">
<a class="hover:text-slate-600 dark:hover:text-slate-200" href="#">Help Center</a>
<a class="hover:text-slate-600 dark:hover:text-slate-200" href="#">Privacy Policy</a>
<a class="hover:text-slate-600 dark:hover:text-slate-200" href="#">Terms of Service</a>
</footer>
</div>
</body></html>
