services:
  # Combined Backend + Frontend Service
  # Frontend is built and served from backend/build directory
  - type: web
    name: wedding-backend
    env: node
    region: oregon
    plan: free
    buildCommand: cd frontend && npm install && cd ../backend && npm install && npm run build
    startCommand: cd backend && npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000

  - type: static
    name: wedding-frontend
    env: static
    buildCommand: cd frontend && npm install && npm run build
    publishPath: frontend/dist
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    envVars:
      - key: VITE_API_BASE_URL
        value: https://backend-w8zt.onrender.com/api
      - key: VITE_BACKEND_URL
        value: https://backend-w8zt.onrender.com
      - key: VITE_API_URL
        value: https://backend-w8zt.onrender.com
      - key: VITE_DEEPFACE_API_URL
        value: https://backend-w8zt.onrender.com/api/deepface
